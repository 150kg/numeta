[package]
name = "numeta"
version = "0.2.0"
edition = "2024"
license = "AGPL-3.0"

[dependencies]
encoding_rs = "0.8"
flate2 = "1"
lopdf = { default-features = false, features = ["rayon"], version = "0.42" }
quick-xml = "0.40"
zip = { default-features = false, features = [
	"bzip2",
	"deflate64",
	"deflate",
	"lzma",
	"xz",
	"zstd",
], version = "8" }
